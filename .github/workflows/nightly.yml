name: DoomMake
run-name: ${{ github.actor }} is generating a nightly build.
on:
  pull_request:
    branches:
      - main
    types:
      - closed
  workflow_dispatch:
    inputs:
      name:
        description: 'Pushes out a pre-release build'
        required: true
        default: 'Daily'

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      # Set fail-fast to false to ensure that feedback is delivered for all matrix combinations. Consider changing this to true when your workflow is stable.
      fail-fast: false

    steps:
    - uses: actions/checkout@v2

    - name: Get current date
      run: echo "NOW=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

    - name: Get yesterday's date
      run: echo "YESTER=$(date -d "yesterday" +'%Y-%m-%d')" >> $GITHUB_ENV

    - name : Set up Freedoom
      run: |
        wget https://github.com/freedoom/freedoom/releases/download/v0.13.0/freedoom-0.13.0.zip
        unzip freedoom-0.13.0.zip
        sudo mv freedoom-0.13.0/freedoom2.wad /home/runner/work/_temp/

    - name: Set up DoomMake
      run: |
        wget https://github.com/MTrop/DoomTools/releases/download/2026.03.27-RELEASE/doomtools-bash-2026.03.27.012840705.tar.gz
        tar -xvf doomtools-bash-2026.03.27.012840705.tar.gz
        chmod +x doommake
        sudo mv doommake /usr/local/bin/
        sudo mv dimgconv /usr/local/bin/
        mkdir /usr/local/bin/jar
        sudo mv jar/doomtools-2026.03.27.012840705.jar /usr/local/bin/jar/

    - name: Build
      # Build your program with the given configuration. Note that --config is needed because the default Windows generator is a multi-config generator (Visual Studio generator).
      run: |
        cp doommake.properties.freedoom doommake.properties
        doommake make

    - name: Re-zip files
      run: |
        rm dist/intercep3.zip
        mv build/intercep3.wad intercep3-${{ env.NOW }}.wad
        mv build/intercep3.txt intercep3-${{ env.NOW }}.txt
        mv src/credits.txt credits.txt
        zip -j intercep3-${{ env.NOW }}.zip intercep3-${{ env.NOW }}.wad intercep3-${{ env.NOW }}.txt credits.txt

    - name: Create release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ env.NOW }}
        release_name: Nightly Build (${{ env.NOW }})
        draft: false
        prerelease: true

    - name: Upload wad zip
      id: upload
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: intercep3-${{ env.NOW }}.zip
        asset_name: intercep3-${{ env.NOW }}.zip
        asset_content_type: application/zip

    - name: Check if previous nightly build exists and delete build if so
      id: check_release
      run: |
        if gh release view ${{ env.YESTER }} > /dev/null 2>&1; then
          echo "EXISTS='today'" >> $GITHUB_ENV;
          gh release delete ${{ env.YESTER }} --cleanup-tag
        elif gh release view ${{ env.NOW }} > /dev/null 2>&1; then
          echo "EXISTS='today'" >> $GITHUB_ENV;
          gh release delete ${{ env.NOW }} --cleanup-tag
        else
          echo "EXISTS='today'" >> $GITHUB_OUTPUT
        fi
      env:
        GH_TOKEN: ${{ github.token }}
